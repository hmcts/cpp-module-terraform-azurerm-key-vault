name: Release

# Self-contained SemVer release automation for this module.
# Uses only the GitHub CLI (gh) and git - no third-party marketplace actions.
#
# On every push to main: calculate the next version from the latest tag
# (patch bump by default), create or update a DRAFT GitHub Release, and
# prepend the change to CHANGELOG.md. A maintainer publishes the draft to
# create the immutable vX.Y.Z tag. Run manually (workflow_dispatch) with a
# bump-type of minor or major when needed.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump-type:
        description: 'Version component to bump for this release'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

# Serialise runs so two pushes cannot race on version calculation / tag creation.
concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        env:
          BUMP_TYPE: ${{ inputs.bump-type || 'patch' }}
        run: |
          set -euo pipefail
          git fetch --tags --quiet || true

          # Latest existing vMAJOR.MINOR.PATCH tag (empty on first release)
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1)

          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="1.0.0"
            echo "No existing version tags - bootstrapping to ${NEXT_VERSION}"
          else
            CORE="${LATEST_TAG#v}"; CORE="${CORE%%-*}"; CORE="${CORE%%+*}"
            if [[ ! "$CORE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Latest tag '${LATEST_TAG}' is not a valid vMAJOR.MINOR.PATCH"; exit 1
            fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CORE"
            case "$BUMP_TYPE" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
              *) echo "::error::Invalid bump-type '${BUMP_TYPE}'"; exit 1 ;;
            esac
            NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT_VERSION}"    >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${LATEST_TAG:-none} | bump: ${BUMP_TYPE} | next: v${NEXT_VERSION}"

      - name: Create or update draft release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          IS_DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null || echo "")
          TARGET="$(git rev-parse HEAD)"
          if [ "$IS_DRAFT" = "true" ]; then
            echo "Updating existing draft ${TAG}"
            gh release edit "$TAG" --title "Release ${VERSION}" --draft --target "$TARGET"
          elif [ -z "$IS_DRAFT" ]; then
            echo "Creating draft ${TAG}"
            gh release create "$TAG" --title "Release ${VERSION}" --draft --generate-notes --target "$TARGET"
          else
            echo "::error::A published release already exists for ${TAG}"; exit 1
          fi

      - name: Update CHANGELOG.md
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          CHANGELOG="CHANGELOG.md"

          # Idempotent: skip if this version is already recorded
          if [ -f "$CHANGELOG" ] && grep -qF "## [${VERSION}]" "$CHANGELOG"; then
            echo "CHANGELOG already contains ${VERSION} - nothing to do"; exit 0
          fi

          # Notes: prefer the draft release body, else fall back to git log
          NOTES=$(gh release view "$TAG" --json body --jq '.body' 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            PREV=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1)
            if [ -n "$PREV" ]; then
              NOTES=$(git log "${PREV}..HEAD" --no-merges --pretty=format:'- %s')
            else
              NOTES=$(git log -n 20 --no-merges --pretty=format:'- %s')
            fi
          fi

          DATE=$(date -u +%Y-%m-%d)
          ENTRY="## [${VERSION}] - ${DATE}"$'\n\n'"${NOTES}"$'\n'

          if [ -f "$CHANGELOG" ] && grep -q '^## ' "$CHANGELOG"; then
            # Insert the new entry above the most recent existing version section
            LINE=$(awk '/^## /{print NR; exit}' "$CHANGELOG")
            HEAD_BLOCK=$(head -n $((LINE - 1)) "$CHANGELOG")
            TAIL_BLOCK=$(tail -n +"$LINE" "$CHANGELOG")
            printf '%s\n\n%s\n%s\n' "$HEAD_BLOCK" "$ENTRY" "$TAIL_BLOCK" > "$CHANGELOG"
          elif [ -f "$CHANGELOG" ]; then
            printf '\n%s\n' "$ENTRY" >> "$CHANGELOG"
          else
            {
              printf '# Changelog\n\n'
              printf 'All notable changes to this Terraform module are documented in this file.\n\n'
              printf 'The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),\n'
              printf 'and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n\n'
            } > "$CHANGELOG"
            printf '%s\n' "$ENTRY" >> "$CHANGELOG"
          fi

          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add "$CHANGELOG"
          if git diff --cached --quiet; then
            echo "No CHANGELOG changes to commit"
          else
            # [skip ci] prevents the push from re-triggering this workflow
            git commit -m "docs: update CHANGELOG for ${VERSION} [skip ci]"
            git push origin HEAD
          fi
