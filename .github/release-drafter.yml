name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# Version bump is resolved from the highest-priority label on the merged PRs.
# Unlabelled PRs fall through to `default` (patch).
version-resolver:
  major:
    labels:
      - breaking-change
  minor:
    labels:
      - enhancement
  patch:
    labels:
      - bug
      - dependencies
      - documentation
      - chore
  default: patch

categories:
  - title: 'Breaking Changes'
    labels:
      - breaking-change
  - title: 'Features'
    labels:
      - enhancement
  - title: 'Bug Fixes'
    labels:
      - bug
  - title: 'Dependency Updates'
    labels:
      - dependencies
  - title: 'Documentation'
    labels:
      - documentation
  - title: 'Maintenance'
    labels:
      - chore

exclude-labels:
  - skip-changelog

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
template: |
  $CHANGES
